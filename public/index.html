<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe Spot</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 화면 1: 바이브 선택창 -->
    <div id="vibe-selection-view" class="screen active">
        <div class="screen-header">
            <h1>Find Your Spot</h1>
            <p class="subtitle">Choose your vibe & taste</p>
        </div>

        <!-- #VIBE-view -->
        <section id="vibe-view" class="selection-section">
            <h2 class="section-title">#VIBE</h2>
            <div id="vibe-buttons" class="tag-grid">
                <!-- 바이브 버튼들이 동적으로 생성됨 -->
            </div>
        </section>

        <!-- #TASTE-view -->
        <section id="taste-view" class="selection-section">
            <h2 class="section-title">#TASTE</h2>
            <div id="taste-buttons" class="tag-grid">
                <!-- 테이스트 버튼들이 동적으로 생성됨 -->
            </div>
        </section>

        <!-- Apply-view -->
        <section id="apply-view" class="apply-section">
            <button id="apply-btn" class="apply-btn" disabled>Apply</button>
        </section>
    </div>

    <!-- 위치 승인 팝업 -->
    <div id="location-popup" class="popup-overlay hidden">
        <div class="popup-card">
            <div class="popup-icon">📍</div>
            <h3>Use Location</h3>
            <p>Allow location access<br>for personalized recommendations.</p>
            <div class="popup-actions">
                <button id="location-deny" class="popup-btn popup-btn-secondary">Deny</button>
                <button id="location-allow" class="popup-btn popup-btn-primary">Allow</button>
            </div>
        </div>
    </div>

    <!-- 화면 2: 메인 (지도 + 리스트) -->
    <div id="main-view" class="screen">
        <!-- Map-view -->
        <div id="map-view" class="map-container">
            <div id="map-display" class="map-display">
                <div id="map-placeholder" class="map-placeholder">
                    <span>Loading map...</span>
                </div>
            </div>
            <button id="personal-ai-btn" class="personal-ai-btn">
                <span class="ai-icon">✦</span> Personal AI
            </button>
        </div>

        <!-- Untitled-view (출력 중심 영역 + 리스트) -->
        <div id="content-view" class="content-container">
            <!-- 출력 중심 영역-view -->
            <div id="output-area" class="output-area">
                <div id="spot-display" class="spot-display">
                    <h2 id="spot-name">Recommended Spot</h2>
                    <p id="spot-description" class="spot-desc"></p>
                </div>
                <button id="making-yours-btn" class="making-yours-btn">
                    ♡ Making yours
                </button>
            </div>

            <!-- List 그룹-view -->
            <div id="list-group-view" class="list-group">
                <h3 class="list-title">Recommended Spots</h3>
                <div id="business-list" class="business-list">
                    <!-- 업체 A-view 들이 동적으로 생성됨 -->
                </div>
            </div>
        </div>

        <!-- 하단 바이브 재선택 버튼 -->
        <button id="back-to-vibe-btn" class="back-btn">
            ← Change Vibe
        </button>
    </div>

    <!-- AI 채팅 패널 -->
    <div id="ai-panel" class="ai-panel hidden">
        <div class="ai-panel-header">
            <h3>✦ Personal AI</h3>
            <button id="ai-close-btn" class="ai-close-btn">✕</button>
        </div>
        <div id="ai-chat" class="ai-chat">
            <div class="ai-message">
                Hey! I'll help you find the perfect spot based on your vibe. Ask me anything!
            </div>
        </div>
        <div class="ai-input-area">
            <input type="text" id="ai-input" placeholder="Ask about a place..." />
            <button id="ai-send-btn" class="ai-send-btn">→</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
